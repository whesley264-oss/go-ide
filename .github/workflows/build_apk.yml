name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          # Remove existing platform directories to force fresh creation
          rm -rf android ios windows macos linux
          # Create project with all platforms
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Find the gradle file - it could be .gradle (Groovy) or .gradle.kts (Kotlin DSL)
          GRADLE_FILE=$(find . -type f \( -path "*/android/app/build.gradle" -o -path "*/android/app/build.gradle.kts" \) \( -name "build.gradle" -o -name "build.gradle.kts" \) 2>/dev/null | head -n 1)
          if [ -n "$GRADLE_FILE" ] && [ -f "$GRADLE_FILE" ]; then
            echo "Gradle file found at $GRADLE_FILE"
            # Check if it's Kotlin DSL (.kts) or Groovy DSL
            if [[ "$GRADLE_FILE" == *.kts ]]; then
              echo "Detected Kotlin DSL (build.gradle.kts)"
              sed -i 's/compileSdk(flutter.compileSdkVersion)/compileSdk(36)/' "$GRADLE_FILE"
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters("armeabi-v7a", "arm64-v8a", "x86_64")\n        }' "$GRADLE_FILE"
            else
              echo "Detected Groovy DSL (build.gradle)"
              sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$GRADLE_FILE"
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' "$GRADLE_FILE"
            fi
          else
            echo "Gradle file not found!"
            echo "Directory contents:"
            find . -type f \( -name "*.gradle" -o -name "*.gradle.kts" \) 2>/dev/null || echo "No gradle files found"
            find . -type d -name "android" 2>/dev/null || echo "No android directories found"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
