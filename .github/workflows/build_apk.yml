name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          flutter create .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Use find to locate the file, in case it's in a different path
          GRADLE_FILE=$(find . -name build.gradle | grep android/app/build.gradle | head -n 1)
          if [ -f "$GRADLE_FILE" ]; then
            echo "Gradle file found at $GRADLE_FILE"
            sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$GRADLE_FILE"
            sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' "$GRADLE_FILE"
          else
            echo "Gradle file not found!"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
