name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -la android/
      - name: Configure Android SDK
        run: |
          # Modify root build.gradle to add subprojects block for compileSdk 36
          if [ -f android/build.gradle ]; then
            echo "" >> android/build.gradle
            echo 'subprojects {' >> android/build.gradle
            echo '    afterEvaluate { project ->' >> android/build.gradle
            echo '        if (project.hasProperty("android")) {' >> android/build.gradle
            echo '            project.android {' >> android/build.gradle
            echo '                compileSdkVersion 36' >> android/build.gradle
            echo '            }' >> android/build.gradle
            echo '        }' >> android/build.gradle
            echo '    }' >> android/build.gradle
            echo '}' >> android/build.gradle
          fi
          cat android/build.gradle
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
