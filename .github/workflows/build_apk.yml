name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Update ALL build.gradle files to use compileSdk 36
          find android -name "*.gradle*" -type f 2>/dev/null | while read f; do
            echo "Processing $f"
            # Remove all import statements
            sed -i '/^import /d' "$f"
            # Replace compileSdk(flutter.compileSdkVersion) with compileSdk 36
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
            # Also handle kotlin.dsl style if present
            sed -i 's/compileSdkVersion(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
          done
          
          if [ -f android/app/build.gradle ]; then
            echo "Configuring android/app/build.gradle"
            # Ensure compileSdk is 36
            grep -q "compileSdk 36" android/app/build.gradle || sed -i 's/compileSdk.*/compileSdk 36/' android/app/build.gradle
            # Add ndk block if missing
            if ! grep -q "ndk {" android/app/build.gradle; then
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
            fi
            echo "build.gradle content:"
            cat android/app/build.gradle
          else
            echo "ERROR: Gradle file not found!"
            ls -la android/app/ 2>/dev/null || echo "android/app not found"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
