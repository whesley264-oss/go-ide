name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -la android/
      - name: Configure Android SDK
        run: |
          # Flutter creates Kotlin DSL files (.gradle.kts), need to convert or handle them
          # First convert .kts to .gradle by removing imports and converting val to def
          for f in $(find android -name "*.gradle.kts" -type f 2>/dev/null); do
            echo "Converting $f"
            base="${f%.kts}"
            # Use sed to convert kotlin to groovy
            # Remove import statements
            sed -i '/^import /d' "$f"
            # Convert val to def
            sed -i 's/val \([a-zA-Z_][a-zA-Z0-9_]*\) =/def \1 =/g' "$f"
            # Convert compileSdk(flutter.compileSdkVersion) to compileSdk 36
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
            # Move to .gradle
            mv "$f" "$base"
          done
          
          # Now process .gradle files
          for f in $(find android -name "*.gradle" -type f 2>/dev/null); do
            echo "Processing $f"
            # Replace compileSdk
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/g' "$f"
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
          done
          
          # Add subprojects block to root build.gradle if needed
          if [ -f android/build.gradle ]; then
            if ! grep -q "subprojects" android/build.gradle; then
              echo "" >> android/build.gradle
              echo "subprojects {" >> android/build.gradle
              echo "    afterEvaluate { project ->" >> android/build.gradle
              echo "        if (project.hasProperty('android')) {" >> android/build.gradle
              echo "            project.android {" >> android/build.gradle
              echo "                compileSdkVersion 36" >> android/build.gradle
              echo "            }" >> android/build.gradle
              echo "        }" >> android/build.gradle
              echo "    }" >> android/build.gradle
              echo "}" >> android/build.gradle
            fi
            echo "=== Modified build.gradle ==="
            cat android/build.gradle
          else
            echo "ERROR: android/build.gradle not found"
            ls -la android/
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
