name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          # Remove existing platform directories to force fresh creation
          rm -rf android ios windows macos linux
          # Create project with all platforms
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Find the gradle file - Flutter creates .gradle.kts (Kotlin DSL) in newer versions
          GRADLE_FILE=""
          if [ -f android/app/build.gradle.kts ]; then
            GRADLE_FILE="android/app/build.gradle.kts"
            echo "Using Kotlin DSL: $GRADLE_FILE"
          elif [ -f android/app/build.gradle ]; then
            GRADLE_FILE="android/app/build.gradle"
            echo "Using Groovy DSL: $GRADLE_FILE"
          fi
          
          if [ -n "$GRADLE_FILE" ] && [ -f "$GRADLE_FILE" ]; then
            echo "Gradle file found at $GRADLE_FILE"
            # For Kotlin DSL (.kts) - use more compatible syntax
            if [[ "$GRADLE_FILE" == *.kts ]]; then
              echo "Configuring Kotlin DSL build file"
              # The ndk config is optional for Kotlin DSL builds
              # Just set compileSdk to 36
              sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk(36)/' "$GRADLE_FILE"
            else
              # For Groovy DSL (.gradle)
              sed -i 's/compileSdk flutter.compileSdkVersion/compileSdk 36/' "$GRADLE_FILE"
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' "$GRADLE_FILE"
            fi
          else
            echo "Gradle file not found at expected locations!"
            ls -la android/app/ 2>/dev/null || echo "android/app directory not found"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
