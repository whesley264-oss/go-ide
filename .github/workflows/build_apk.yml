name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            echo "Converting Kotlin DSL to Groovy DSL"
            sed -i '/^import /d' android/app/build.gradle.kts
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' android/app/build.gradle.kts
            mv android/app/build.gradle.kts android/app/build.gradle
            echo "Converted .kts to .gradle"
          fi
          
          if [ -f android/app/build.gradle ]; then
            echo "Configuring build.gradle"
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/g' android/app/build.gradle
            if ! grep -q "ndk {" android/app/build.gradle; then
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
            fi
          else
            echo "ERROR: Gradle file not found!"
            ls -la android/app/ 2>/dev/null || echo "android/app not found"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
