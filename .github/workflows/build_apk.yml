name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Convert ALL .kts files to .gradle with proper syntax conversion
          for f in $(find android -name "*.gradle.kts" -type f 2>/dev/null); do
            echo "Converting $f to .gradle"
            base="${f%.kts}"
            
            # Use Python for proper Kotlin to Groovy conversion
            python3 << PYEOF
import re

with open("$f", "r") as file:
    content = file.read()

# Remove import statements
content = re.sub(r"^import .*$", "", content, flags=re.MULTILINE)

# Convert val to def
content = re.sub(r"\bval\b", "def", content)

# Convert function call syntax: foo("bar") -> foo = "bar" for simple cases
# But be careful with function calls like plugins { }

# Convert compileSdk(flutter.compileSdkVersion) to compileSdk 36
content = re.sub(r"compileSdk\(flutter\.compileSdkVersion\)", "compileSdk 36", content)

# Write to .gradle file
with open("$base", "w") as file:
    file.write(content)

print(f"Converted $f to $base")
PYEOF
            rm -f "$f"
          done
          
          # Now process all .gradle files
          for f in $(find android -name "*.gradle" -type f 2>/dev/null); do
            echo "Processing $f"
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/g' "$f"
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
          done
          
          if [ -f android/app/build.gradle ]; then
            echo "Configuring android/app/build.gradle"
            # Ensure compileSdk is 36
            grep -q "compileSdk 36" android/app/build.gradle || sed -i 's/compileSdk.*/compileSdk 36/' android/app/build.gradle
            # Add ndk block if missing
            if ! grep -q "ndk {" android/app/build.gradle; then
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
            fi
            echo "=== Final build.gradle content ==="
            cat android/app/build.gradle
          else
            echo "ERROR: Gradle file not found!"
            ls -la android/app/ 2>/dev/null
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
