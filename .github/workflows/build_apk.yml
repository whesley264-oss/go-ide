name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Convert .kts files to .gradle using shell
          for f in $(find android -name "*.gradle.kts" -type f 2>/dev/null); do
            echo "Converting $f"
            base="${f%.kts}"
            
            # Remove import statements
            sed -i '/^import /d' "$f"
            
            # Convert val to def: val foo = -> def foo =
            # This regex handles val followed by identifier and =
            sed -i 's/val \+\([a-zA-Z_][a-zA-Z0-9_]*\) *= *\(.*\)$/def \1 = \2/' "$f"
            
            # Convert compileSdk(flutter.compileSdkVersion) to compileSdk 36
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
            
            # Move to .gradle
            mv "$f" "$base"
          done
          
          # Process .gradle files
          for f in $(find android -name "*.gradle" -type f 2>/dev/null); do
            echo "Processing $f"
            # Remove any remaining import statements
            sed -i '/^import /d' "$f"
            # Replace compileSdk patterns
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/g' "$f"
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/g' "$f"
          done
          
          if [ -f android/app/build.gradle ]; then
            echo "Configuring android/app/build.gradle"
            if ! grep -q "ndk {" android/app/build.gradle; then
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
            fi
            cat android/app/build.gradle
          else
            echo "ERROR: Gradle file not found!"
            ls -la android/app/
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
