name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.3'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          rm -rf android ios windows macos linux
          flutter create --platforms android,ios,windows,macos,linux --project-name flutter_go_ide .
          ls -la android/
      - name: Configure Android SDK
        run: |
          # Set compileSdk to 36 in android/app/build.gradle
          if [ -f android/app/build.gradle ]; then
            sed -i 's/compileSdkVersion flutter\.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/g' android/app/build.gradle
            sed -i 's/compileSdkVersion = flutter\.compileSdkVersion/compileSdkVersion 36/g' android/app/build.gradle
            echo "=== Modified app/build.gradle ==="
            cat android/app/build.gradle
          else
            echo "ERROR: android/app/build.gradle not found"
            ls -la android/app/
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
