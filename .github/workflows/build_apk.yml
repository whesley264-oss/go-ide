name: Build Flutter APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install dependencies
        run: flutter pub get
      - name: Create native scaffolding
        run: |
          # Remove existing platform directories to force fresh creation
          rm -rf android ios windows macos linux
          # Create project with all platforms
          flutter create --platforms android,ios,windows,macos,linux .
          ls -R android/ || echo "Android directory not created"
      - name: Inject Android Build Config
        run: |
          # Convert Kotlin DSL to Groovy DSL if needed
          if [ -f android/app/build.gradle.kts ]; then
            echo "Converting Kotlin DSL (.kts) to Groovy DSL (.gradle)"
            python3 << 'PYEOF'
import re

with open('android/app/build.gradle.kts', 'r') as f:
    content = f.read()

# Remove import statements  
content = re.sub(r'^import .*$', '', content, flags=re.MULTILINE)

# Convert function calls to assignments:
# namespace("com.example.app") -> namespace = "com.example.app"
content = re.sub(r'(\w+)\("([^"]+)"\)', r'\1 = "\2"', content)

# Convert compileSdk(flutter.compileSdkVersion) -> compileSdk 36
content = re.sub(r'compileSdk\(flutter\.compileSdkVersion\)', 'compileSdk 36', content)

# Convert ndk { abiFilters(...) } to proper Groovy format
# For now, remove the ndk block since it's causing issues
content = re.sub(r'ndk\s*\{[^}]*abiFilters\s*\([^)]*\)[^}]*\}', 'ndk { abiFilters "armeabi-v7a", "arm64-v8a", "x86_64" }', content)

with open('android/app/build.gradle', 'w') as f:
    f.write(content)

print("Converted build.gradle.kts to build.gradle")
PYEOF
            rm -f android/app/build.gradle.kts
          fi
          
          if [ -f android/app/build.gradle ]; then
            echo "Gradle file found at android/app/build.gradle"
            # Ensure compileSdk is set to 36
            sed -i 's/compileSdk flutter\.compileSdkVersion/compileSdk 36/' android/app/build.gradle
            sed -i 's/compileSdk(flutter\.compileSdkVersion)/compileSdk 36/' android/app/build.gradle
            # Ensure ndk block exists
            if ! grep -q "ndk {" android/app/build.gradle; then
              sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
            fi
          else
            echo "ERROR: Gradle file not found!"
            ls -la android/app/ 2>/dev/null || echo "android/app directory not found"
            exit 1
          fi
      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: go-ide-apk
          path: build/app/outputs/flutter-apk/app-release.apk
